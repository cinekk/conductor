# Langfuse self-hosted deployment (v2)
# Provides the OTLP-compatible tracing backend for Conductor.
#
# Usage:
#   docker compose -f docker-compose.langfuse.yml up -d
#
# Then set in .env:
#   LANGFUSE_HOST=http://localhost:3000   (or your public URL)
#   LANGFUSE_PUBLIC_KEY=pk-lf-...         (from Langfuse UI → Settings)
#   LANGFUSE_SECRET_KEY=sk-lf-...

services:
  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@db:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_HOST:-http://localhost:3000}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?Set LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT:?Set LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  langfuse_db:
