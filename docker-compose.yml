# Production stack: Conductor + Langfuse + Postgres + Caddy
#
# Prerequisites:
#   cp .env.example .env  # then fill in all values
#
# Start:
#   docker compose up -d
#
# Deploy update:
#   make deploy

services:
  conductor:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Not exposed directly — Caddy proxies to it
    networks: [internal, web]

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@db:5432/langfuse
      NEXTAUTH_URL: https://${LANGFUSE_DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped
    networks: [internal, web]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      CONDUCTOR_DOMAIN: ${CONDUCTOR_DOMAIN}
      LANGFUSE_DOMAIN: ${LANGFUSE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks: [web]

networks:
  internal:   # DB + app traffic — not reachable from host
  web:        # Caddy ↔ app services

volumes:
  db_data:
  caddy_data:
  caddy_config:
